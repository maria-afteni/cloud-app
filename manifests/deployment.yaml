apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloud-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloud-app

  template:
    metadata:
      labels:
        app: cloud-app

    spec:
      containers:
        - name: cloud-app
          image: maraft03/cloud-app:v5
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"